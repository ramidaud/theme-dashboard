<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theme Exploration Dashboard</title>
    <meta
      name="description"
      content="A brainstorming and preparation dashboard for university marketing theme exploration."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=14" />
  </head>
  <body>
    <div class="master-container">
      <header class="hero" style="background-image: url('images/overview-header.jpg');">
      <div class="container">
        <h1 class="hero-title">Theme Exploration Dashboard</h1>
        <p class="hero-subtitle">
          Preparing UCM to support university priorities and college/division
          marketing needs through consolidation.
        </p>
      </div>
    </header>

    <div class="container">
      <main id="app" class="data-wall">
        <!-- At a Glance Stats -->
        <section class="section animate-in" id="atAGlanceSection" style="grid-column: 1 / -1;"></section>

        <!-- Theme Status Cards -->
        <section class="section animate-in" id="themeCards" style="grid-column: 1 / -1;"></section>

        <!-- Upcoming Meetings -->
        <section class="section animate-in" id="meetingsSection"></section>

        <!-- General / Facilitator Meeting Notes -->
        <section class="section animate-in" id="globalMeetingNotesSection"></section>

        <!-- Cross-Theme Intelligence (tabbed) -->
        <section class="section animate-in" id="crossThemeSection" style="grid-column: 1 / -1;"></section>
      </main>
    </div>

    </div>

    <!-- Floating AI FAB -->
    <button class="ai-fab" id="aiFabBtn" onclick="toggleAIPanel()" title="Dashboard Assistant">✨</button>
    <div class="ai-fab-panel" id="aiFabPanel"></div>
    
    <script src="js/app.js?v=6" defer></script>
    <script src="js/ai.js?v=5" defer></script>
    <script src="js/overview.js?v=5" defer></script>
  </body>
</html>
