<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Breakout — Theme Exploration Dashboard</title>
  <meta name="description" content="Theme breakout page for exploring ideas, meeting notes, tasks, and recommendations.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=14">
</head>
<body>
  <div class="master-container">
    <header class="hero" id="themeHeader"></header>

  <div class="container">
    <!-- People (compact pill row) -->
    <section class="section animate-in" id="peopleSection"></section>

    <!-- 2-Column Layout -->
    <div class="theme-content-2col">
      <div class="theme-col-left">
        <section class="section animate-in" id="explorationSection"></section>
        <section class="section animate-in" id="meetingNotesSection"></section>
      </div>
      <div class="theme-col-right">
        <section class="section animate-in" id="tasksSection"></section>
        <section class="section animate-in" id="recommendationsSection"></section>
      </div>
    </div>

    <!-- Theme Notes (full width) -->
    <section class="section animate-in" id="themeNotesSection"></section>
  </div>

  </div>

  <script src="js/app.js?v=6" defer></script>
  <script src="js/ai.js?v=5" defer></script>
  <script src="js/theme.js?v=5" defer></script>
</body>
</html>
